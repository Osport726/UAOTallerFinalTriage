stages:
  - test
  - build
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - when: never

variables:
  UV_VERSION: "0.10.9"
  PYTHON_VERSION: "3.12"
  BASE_LAYER: "trixie-slim"
  UV_LINK_MODE: "copy"
  UV_CACHE_DIR: ".uv-cache"

  IMAGE_NAME: "osport726/devproyectriage"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

  DEPLOY_USER: "root"
  DEPLOY_PATH: "/opt/soporte_ti"
  DEPLOY_HOST: "143.198.49.22"

  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_BUILDKIT: "1"

default:
  interruptible: true

# ---------------------------------------------------------
# Plantilla base para jobs Python que sí requieren entorno
# ---------------------------------------------------------
.uv-job:
  image: ghcr.io/astral-sh/uv:$UV_VERSION-python$PYTHON_VERSION-$BASE_LAYER
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .uv-cache
  before_script:
    - uv sync --locked --group dev

# ---------------------------------------------------------
# Tests
# ---------------------------------------------------------
tests:
  extends: .uv-job
  stage: test
  script:
    - USE_DUMMY_MODEL=1 uv run pytest --junitxml=pytest-report.xml
  artifacts:
    when: always
    reports:
      junit: pytest-report.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - src/**/*
        - tests/**/*
        - pyproject.toml
        - uv.lock
        - main.py
        - proto/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ---------------------------------------------------------
# Lint rápido, sin instalar todas las dependencias del proyecto
# ---------------------------------------------------------
linting:
  stage: test
  image: ghcr.io/astral-sh/uv:$UV_VERSION-python$PYTHON_VERSION-$BASE_LAYER
  cache:
    key: "ruff-$CI_COMMIT_REF_SLUG"
    paths:
      - .uv-cache
  script:
    - uv tool run ruff check src tests scripts main.py --exclude src/grpc/stubs
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - src/**/*
        - tests/**/*
        - scripts/**/*
        - main.py
        - pyproject.toml
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ---------------------------------------------------------
# Build de imagen Docker
# ---------------------------------------------------------
build_image:
  stage: build
  image: docker:29.3.0-cli
  services:
    - docker:29.3.0-dind
  needs:
    - tests
    - linting
  before_script:
    - echo "$REGISTRY_PASS" | docker login -u "$REGISTRY_USER" --password-stdin
  script:
    - docker build --pull -t "$IMAGE_NAME:$IMAGE_TAG" .
    - docker push "$IMAGE_NAME:$IMAGE_TAG"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$IMAGE_NAME:$IMAGE_TAG" "$IMAGE_NAME:latest"
        docker push "$IMAGE_NAME:latest"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - src/**/*
        - pyproject.toml
        - uv.lock
        - Dockerfile
        - docker-compose.prod.yml
        - main.py
        - proto/**/*
    - when: never

# ---------------------------------------------------------
# Deploy automático solo desde main
# ---------------------------------------------------------
deploy_container:
  stage: deploy
  image: alpine:latest
  needs:
    - build_image
  before_script:
    - apk add --no-cache openssh-client bash
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - printf "%s" "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
  script:
    - |
      ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" "
        mkdir -p $DEPLOY_PATH &&
        cat > $DEPLOY_PATH/.env <<EOF
      IMAGE_NAME=$IMAGE_NAME
      IMAGE_TAG=latest
      USE_DUMMY_MODEL=0
      USE_GRPC_BACKEND=0
      EOF
      "
    - |
      scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null docker-compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.prod.yml"
    - |
      ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$DEPLOY_USER@$DEPLOY_HOST" "
        echo '$REGISTRY_PASS' | docker login -u '$REGISTRY_USER' --password-stdin &&
        docker compose --env-file $DEPLOY_PATH/.env -f $DEPLOY_PATH/docker-compose.prod.yml pull &&
        docker compose --env-file $DEPLOY_PATH/.env -f $DEPLOY_PATH/docker-compose.prod.yml up -d &&
        docker image prune -f
      "
  rules:
    - if: $CI_COMMIT_BRANCH == "main"